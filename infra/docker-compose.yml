services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: personalassist-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (optional, for faster bulk operations)
    volumes:
      - ../storage/qdrant_data:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: personalassist-redis
    ports:
      - "6379:6379"
    volumes:
      - ../storage/redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
